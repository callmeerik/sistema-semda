{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-linear-60 from-gray-900 via-gray-800 to-black">
  <div class="bg-gray-900 p-6 rounded-xl shadow-md w-full max-w-md">

    <img src="{% static 'images/logo.png' %}" alt="logo semda fundacion" class="w-40 h-16 mx-auto">
    <h1 class="text-xl font-bold mb-4">Recuperación de Contraseña</h1>

    <form method="post" class="space-y-4 py-4 `x-2">
      {% csrf_token %}
      <div>
        <label for="{{ form.new_password1.id_for_label }}"
                class="block text-2xl font-medium text-gray-200 mb-1">
            Nueva Contraseña
        </label>
        <input type="password"
            name="new_password1"
            required
            class="w-full bg-gray-800 text-white px-4 py-3 rounded-xl
                    focus:ring-2 focus:ring-pink-600 outline-none"
            placeholder="Nueva contraseña">

      </div>
      <div>
        <label for="{{ form.new_password2.id_for_label }}"
                class="block text-2xl font-medium text-gray-300 mb-1">
            Confirmar Contraseña
        </label>
        <input type="password"
            name="new_password2"
            required
            class="w-full bg-gray-800 text-white px-4 py-3 rounded-xl
                    focus:ring-2 focus:ring-pink-600 outline-none"
            placeholder="Confirmar contraseña">


      </div>

      <button class="w-full cursor-pointer bg-emerald-600 text-white py-2 rounded-lg">
        Guardar contraseña
      </button>
    </form>
  </div>
</div>
{% endblock %}

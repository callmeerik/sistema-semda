{% extends "base.html" %}
{% load static %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-linear-60 from-gray-950 via-gray-800 to-black">
  <div class="bg-gray-950 p-6 rounded-xl shadow-md w-full max-w-md">
       <img src="{% static 'images/logo.png' %}" alt="logo semda fundacion" class="w-40 h-16 mx-auto">

        <h1 class="text-xl text-white font-bold mb-4">¿Olvidaste tu contraseña?</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
        <label for="{{ form.email.id_for_label }}"
                class="block text-sm font-medium text-gray-300 mb-1">
            Correo electrónico
        </label>
      <input type="email"
           name="email"
           value="{{ form.email.value|default:'' }}"
           required
           placeholder="correo@ejemplo.com"
           class="w-full bg-gray-800 text-white px-4 py-3 rounded-xl
                  focus:ring-2 focus:ring-pink-600 outline-none">

      <button
        type="submit"
        class="w-full bg-pink-600 text-white py-2 rounded-lg hover:bg-pink-700">
        Enviar enlace
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}
Iniciar Sesión
{% endblock %}

{% block content %}
<div class="min-h-screen bg-linear-60 from-gray-900 via-gray-800 to-black flex justify-center py-10">
    <div class="w-full max-w-xl bg-white/5 shadow-lg rounded-2xl p-8">

        <div class="flex items-center gap-3 mb-6">
            <svg class="w-8 h-8 text-pink-600" fill="none" stroke="currentColor" stroke-width="1.5"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.5 10.5V7.5A4.5 4.5 0 007.5 7.5v3m9 0H7.5m9 0A2.25 2.25 0 0118.75 12.75v6A2.25 2.25 0 0116.5 21H7.5A2.25 2.25 0 015.25 18.75v-6A2.25 2.25 0 017.5 10.5m9 0H7.5" />
            </svg>
            <h1 class="text-2xl font-semibold text-white">Cambiar Contraseña</h1>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-white font-medium mb-1">Contraseña actual</label>
                <input type="password" name="actual"
                    class="w-full text-white px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-red-500 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-white font-medium mb-1">Nueva contraseña</label>
                    <input type="password" name="nueva1"
                        class="w-full text-white px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-red-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-white font-medium mb-1">Repetir nueva contraseña</label>
                    <input type="password" name="nueva2"
                        class="w-full text-white px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-red-500 focus:outline-none">
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit"
                    class="px-6 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition">
                    Actualizar
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
